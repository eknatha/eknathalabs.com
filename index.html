<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Eknatha Labs – DevOps Learning Platform</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at 20% 30%, #0f172a, #020617);
  color: #00f7ff;
  font-family: monospace;
  display: flex;
  justify-content: center;
}

.grid {
  position: fixed;
  width: 200%;
  height: 200%;
  background-image:
    linear-gradient(#00f7ff22 1px, transparent 1px),
    linear-gradient(90deg, #00f7ff22 1px, transparent 1px);
  background-size: 50px 50px;
  animation: gridMove 20s linear infinite;
  z-index: -2;
}
@keyframes gridMove { to { transform: translate(-50px,-50px);} }

.container {
  max-width: 900px;
  text-align: center;
  padding: 40px 20px;
}

h1 {
  text-shadow: 0 0 20px #00f7ff;
  animation: pulse 2s infinite alternate;
}
@keyframes pulse { to { text-shadow: 0 0 40px #00f7ff; } }

.tagline {
  color: #cbd5f5;
  margin-bottom: 30px;
}

/* terminal */
.line {
  overflow: hidden;
  border-right: 2px solid #00f7ff;
  white-space: nowrap;
  animation: typing 3s steps(40), blink 1s infinite;
}
.line:nth-child(2){animation-delay:3s;}
.line:nth-child(3){animation-delay:6s;}

@keyframes typing { from{width:0} to{width:100%} }
@keyframes blink { 50%{border-color:transparent} }

.status { margin-top:20px; }

input {
  background: transparent;
  border: none;
  border-bottom: 1px solid #00f7ff;
  color: #00f7ff;
  text-align: center;
  width: 100%;
}

#output {
  margin-top: 10px;
  color: #cbd5f5;
  max-height: 200px;
  overflow-y: auto;
  text-align: left;
}

/* lab panel */
.lab-panel {
  margin-top: 20px;
  padding: 15px;
  border: 1px solid #00f7ff33;
  border-radius: 10px;
  background: rgba(0,0,0,0.5);
  text-align: left;
}
.hidden { display:none; }

.lab-panel button {
  margin-top:10px;
  padding:6px 10px;
  background:#8b5cf6;
  border:none;
  color:white;
  cursor:pointer;
}

/* github */
.github { margin-top:60px; }

.github img {
  width:100%;
  margin:10px 0;
}

.repos {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.repo-card {
  border:1px solid #00f7ff33;
  padding:15px;
  border-radius:10px;
  background:rgba(0,0,0,0.4);
  transition:0.3s;
}
.repo-card:hover {
  transform:translateY(-5px);
  box-shadow:0 0 20px #00f7ff;
}
.repo-card a { color:#8b5cf6; }

/* courses */
.courses {
  margin-top: 60px;
}

.course-card {
  border: 1px solid #00f7ff33;
  padding: 20px;
  margin: 15px 0;
  border-radius: 10px;
  cursor: pointer;
  background: rgba(0,0,0,0.4);
  transition: 0.3s;
}

.course-card:hover {
  transform: scale(1.03);
  box-shadow: 0 0 20px #00f7ff;
}
</style>
</head>

<body>

<div class="grid"></div>

<div class="container">

<h1>🚀 Eknatha Labs</h1>

<div class="tagline">
Cloud, DevOps, and Platform Engineering tutorials, tools, and solutions
</div>

<!-- Terminal -->
<div class="terminal">
  <div class="line">> initializing eknathalabs...</div>
  <div class="line">> deploying interactive cloud labs...</div>
  <div class="line">> creating tutorials...</div>
</div>

<div class="status" id="rotate"></div>

<input id="cmd" placeholder="docker | k8s | learn docker | help"/>
<div id="output"></div>

<div id="lab-panel" class="lab-panel hidden"></div>

<!-- GitHub -->
<div class="github">
  <h2>⚡ GitHub Activity</h2>

  <img src="https://github-readme-stats.vercel.app/api?username=eknatha&show_icons=true&theme=tokyonight&bg_color=00000000"/>
  <img src="https://github-readme-activity-graph.vercel.app/graph?username=eknatha&theme=tokyo-night&bg_color=00000000"/>

  <h2>📦 Projects</h2>
  <div class="repos" id="repos"></div>
</div>

<!-- Courses -->
<div class="courses">
  <h2>🎓 Learning Paths</h2>

  <div class="course-card" onclick="openCourse('docker')">
    🐳 Docker Mastery
  </div>

  <div class="course-card" onclick="openCourse('k8s')">
    ☸️ Kubernetes Mastery
  </div>
</div>

<div id="course-view" class="lab-panel hidden"></div>

</div>

<script>
// rotating text
const words=["learn","build","deploy","scale"];
let i=0;
setInterval(()=>{
 document.getElementById("rotate").innerText="> "+words[i];
 i=(i+1)%words.length;
},1500);

// terminal helpers
const input = document.getElementById("cmd");
const output = document.getElementById("output");
const panel = document.getElementById("lab-panel");

function print(cmd,res){
  output.innerHTML += `<div>> ${cmd}</div><div>${res}</div>`;
  output.scrollTop = output.scrollHeight;
}

// tutorials
const tutorials = {
  docker:["docker run hello-world","docker ps","docker images"],
  k8s:["kubectl get pods","kubectl create deployment nginx --image=nginx"]
};

function showTutorial(type){
  let steps = tutorials[type];
  let stepIndex = 0;
  panel.classList.remove("hidden");

  function render(){
    panel.innerHTML = `
      <h3>${type}</h3>
      <p>${steps[stepIndex]}</p>
      <button onclick="nextStep()">Next</button>
      <button onclick="launchLab('${type}')">Launch Lab</button>
    `;
  }

  window.nextStep = function(){
    if(stepIndex < steps.length-1){
      stepIndex++;
      render();
    } else {
      panel.innerHTML += "<p>✅ Completed</p>";
    }
  };

  render();
}

function launchLab(type){
  if(type==="docker") window.open("https://labs.play-with-docker.com/");
  if(type==="k8s") window.open("https://killercoda.com/");
}

// commands
input.addEventListener("keypress",function(e){
 if(e.key==="Enter"){
   const cmd = input.value.toLowerCase().trim();
   panel.classList.add("hidden");

   switch(cmd){
     case "docker":
       print(cmd,"🚀 Opening Docker lab...");
       launchLab("docker");
       break;

     case "k8s":
       print(cmd,"☸️ Opening Kubernetes lab...");
       launchLab("k8s");
       break;

     case "learn docker":
       print(cmd,"📘 Loading Docker tutorial...");
       showTutorial("docker");
       break;

     case "learn k8s":
       print(cmd,"📘 Loading Kubernetes tutorial...");
       showTutorial("k8s");
       break;

     default:
       print(cmd,"❓ command not found");
   }

   input.value="";
 }
});

// courses
const courseView = document.getElementById("course-view");

const courses = {
  docker:["Intro","Images","Networking","Compose","Project"],
  k8s:["Basics","Pods","Deployments","Scaling","Production"]
};

function openCourse(name){
  courseView.classList.remove("hidden");

  courseView.innerHTML = `
    <h3>${name.toUpperCase()}</h3>
    ${courses[name].map((m,i)=>`
      <div onclick="startLesson('${name}',${i})">📘 ${m}</div>
    `).join("")}
  `;
}

function startLesson(course,index){
  courseView.innerHTML = `
    <h3>${courses[course][index]}</h3>
    <button onclick="showTutorial('${course}')">
      Start Lab 🚀
    </button>
  `;
}

// fetch repos
fetch("https://api.github.com/users/eknatha/repos?sort=updated")
.then(res=>res.json())
.then(data=>{
  const c=document.getElementById("repos");
  data.slice(0,6).forEach(r=>{
    c.innerHTML+=`
    <div class="repo-card">
      <h3>${r.name}</h3>
      <p>${r.description||"No description"}</p>
      <a href="${r.html_url}" target="_blank">View Repo</a>
    </div>`;
  });
});
</script>

</body>
</html>
