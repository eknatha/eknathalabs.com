<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Eknatha Labs – Cloud, DevOps, and Platform Engineering</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at 20% 30%, #0f172a, #020617);
  color: #00f7ff;
  font-family: monospace;
  display: flex;
  justify-content: center;
}

/* GRID */
.grid {
  position: fixed;
  width: 200%;
  height: 200%;
  background-image:
    linear-gradient(#00f7ff22 1px, transparent 1px),
    linear-gradient(90deg, #00f7ff22 1px, transparent 1px);
  background-size: 50px 50px;
  animation: gridMove 20s linear infinite;
  z-index: -2;
}
@keyframes gridMove {
  from { transform: translate(0,0); }
  to { transform: translate(-50px,-50px); }
}

/* CONTAINER */
.container {
  max-width: 900px;
  text-align: center;
  padding: 40px 20px;
}

/* TITLE */
h1 {
  text-shadow: 0 0 20px #00f7ff;
  animation: pulse 2s infinite alternate;
}
@keyframes pulse {
  from { text-shadow: 0 0 10px #00f7ff; }
  to { text-shadow: 0 0 40px #00f7ff; }
}

.tagline {
  color: #cbd5f5;
  margin-bottom: 30px;
}

/* TERMINAL */
.line {
  overflow: hidden;
  border-right: 2px solid #00f7ff;
  white-space: nowrap;
  animation: typing 3s steps(40), blink 1s infinite;
}
.line:nth-child(2){animation-delay:3s;}
.line:nth-child(3){animation-delay:6s;}

@keyframes typing {
  from { width: 0 }
  to { width: 100% }
}
@keyframes blink {
  50% { border-color: transparent }
}

/* STATUS */
.status {
  margin-top: 20px;
}

/* INPUT */
input {
  background: transparent;
  border: none;
  border-bottom: 1px solid #00f7ff;
  color: #00f7ff;
  text-align: center;
}

/* OUTPUT */
#output {
  margin-top: 10px;
  color: #cbd5f5;
}

/* GITHUB SECTION */
.github {
  margin-top: 60px;
}

.github img {
  width: 100%;
  margin: 10px 0;
}

/* REPO CARDS */
.repos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
  margin-top: 20px;
}

.repo-card {
  border: 1px solid #00f7ff33;
  padding: 15px;
  border-radius: 10px;
  background: rgba(0,0,0,0.4);
  transition: 0.3s;
}

.repo-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 20px #00f7ff;
}

.repo-card a {
  color: #8b5cf6;
  text-decoration: none;
}

/* CONSTRUCTION BADGE */
.construction {
  position: fixed;
  bottom: 15px;
  right: 15px;
  padding: 8px 14px;
  border: 1px solid #00f7ff;
  border-radius: 20px;
  box-shadow: 0 0 10px #00f7ff;
}
</style>
</head>

<body>

<div class="grid"></div>

<div class="container">

<h1>🚀 Eknatha Labs</h1>

<div class="tagline">
Cloud, DevOps, and Platform Engineering tutorials, tools, and solutions
</div>

<div class="terminal">
  <div class="line">> initializing eknathalabs...</div>
  <div class="line">> deploying interactive cloud labs...</div>
  <div class="line">> creating tutorials...</div>
</div>

<div class="status" id="rotate"></div>

<input id="cmd" placeholder="labs | tutorials | github | projects"/>
<div id="output"></div>

<!-- 🔥 GitHub Section -->
<div class="github">
  <h2>⚡ GitHub Activity</h2>

  <img src="https://github-readme-stats.vercel.app/api?username=eknatha&show_icons=true&theme=tokyonight&bg_color=00000000"/>
  <img src="https://github-readme-activity-graph.vercel.app/graph?username=eknatha&theme=tokyo-night&bg_color=00000000"/>

  <h2>📦 Featured Projects</h2>
  <div class="repos" id="repos"></div>
</div>

</div>

<div class="construction">🚧 Under construction</div>

<script>
// rotating text
const words=["learn","build","deploy","scale"];
let i=0;
setInterval(()=>{
 document.getElementById("rotate").innerText="> "+words[i];
 i=(i+1)%words.length;
},1500);

// commands
const input=document.getElementById("cmd");
const output=document.getElementById("output");

input.addEventListener("keypress",function(e){
 if(e.key==="Enter"){
   let cmd=input.value.toLowerCase();
   let res="";
   if(cmd==="labs") res="🚀 Labs coming soon";
   else if(cmd==="tutorials") res="📘 Tutorials coming soon";
   else if(cmd==="github") res="👉 https://github.com/eknatha";
   else if(cmd==="projects") res="👇 Scroll to view projects";
   else res="❓ command not found";
   output.innerHTML+=`<div>> ${cmd}</div><div>${res}</div>`;
   input.value="";
 }
});

// fetch repos
fetch("https://api.github.com/users/eknatha/repos?sort=updated")
.then(res=>res.json())
.then(data=>{
  const container=document.getElementById("repos");
  data.slice(0,6).forEach(repo=>{
    const div=document.createElement("div");
    div.className="repo-card";
    div.innerHTML=`
      <h3>${repo.name}</h3>
      <p>${repo.description || "No description"}</p>
      <a href="${repo.html_url}" target="_blank">View Repo</a>
    `;
    container.appendChild(div);
  });
});
</script>

</body>
</html>
